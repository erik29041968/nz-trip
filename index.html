<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NZ Trip Sync</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            /* Solid New Zealand Deep Blue & Slate Gradient - Guaranteed to load */
            background: linear-gradient(135deg, #001f3f 0%, #000000 100%);
            background-attachment: fixed;
            color: white; 
            margin: 0; padding: 20px; 
            display: flex; justify-content: center;
            min-height: 100vh;
        }
        .container { width: 100%; max-width: 450px; }
        .card { 
            background: rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 20px; 
            border-radius: 20px; 
            margin-bottom: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }
        .balance-box { 
            background: #ffffff; 
            color: #000000; 
            padding: 22px; 
            border-radius: 15px; 
            text-align: center; 
            font-size: 1.4rem; 
            font-weight: 900;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        label { display: block; margin-top: 12px; font-size: 0.75rem; color: #bbb; text-transform: uppercase; letter-spacing: 1px; }
        input, select { 
            width: 100%; padding: 14px; margin: 5px 0 10px 0; border-radius: 12px; 
            border: 1px solid rgba(255, 255, 255, 0.2); background: rgba(0, 0, 0, 0.3); 
            color: white; font-size: 16px; outline: none; -webkit-appearance: none;
        }
        .add-btn { 
            width: 100%; padding: 18px; background: #007aff; border: none; 
            color: white; border-radius: 12px; font-weight: bold; 
            cursor: pointer; margin-top: 15px; text-transform: uppercase;
            letter-spacing: 1px; font-size: 1rem;
        }
        .add-btn:active { transform: scale(0.98); opacity: 0.9; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        td { padding: 15px 5px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); font-size: 0.9rem; }
        
        .name-erik { color: #4cd9ff; font-weight: bold; }
        .name-nadine { color: #ff85c1; font-weight: bold; }
        
        .del-btn { color: #ff3b30; background: rgba(255,59,48,0.1); border: 1px solid #ff3b30; cursor: pointer; border-radius: 50%; width: 28px; height: 28px; font-size: 12px; }
        .sync-status { text-align: center; font-size: 11px; color: rgba(255,255,255,0.6); margin-bottom: 15px; font-weight: 600; text-transform: uppercase; }
        h2 { text-align: center; margin-top: 0; letter-spacing: 4px; font-weight: 900; color: #fff; }
    </style>
</head>
<body>

<div class="container">
    <h2>🇳🇿 NZ TRIP</h2>
    <div class="sync-status" id="status">Connecting...</div>
    
    <div class="card">
        <div class="balance-box" id="balanceText">Ready</div>
    </div>

    <div class="card">
        <label>Date</label>
        <input type="date" id="date">
        <label>Description</label>
        <input type="text" id="desc" placeholder="What did you buy?">
        <label>Amount ($)</label>
        <input type="number" id="amount" step="0.01" placeholder="0.00" inputmode="decimal">
        <label>Who paid?</label>
        <select id="payer">
            <option value="Erik">Erik</option>
            <option value="Nadine">Nadine</option>
        </select>
        <button class="add-btn" onclick="addExpense()">Add Expense</button>
    </div>

    <div class="card">
        <table><tbody id="list"></tbody></table>
        <p id="totalCost" style="text-align:center; font-weight:bold; margin-top:20px; font-size: 1.1rem; color: #ccc;"></p>
        <center>
            <button onclick="loadFromCloud()" style="background:none; border:none; color:rgba(255,255,255,0.4); text-decoration:underline; font-size: 12px; cursor:pointer; padding: 10px;">
                🔄 Refresh Cloud Data
            </button>
        </center>
    </div>
</div>

<script>
    const BIN_ID = '69b88720aa77b81da9ee9c67'; 
    const API_KEY = '$2a$10$RfeNG6fuZHWzfHxMyVS1AuNG9Zr11QdW3/GvgTM9CtJpGXk03oyOK';

    let expenses = [];

    async function loadFromCloud() {
        const statusEl = document.getElementById('status');
        statusEl.innerText = "Syncing...";
        try {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                headers: { 'X-Master-Key': API_KEY }
            });
            const data = await res.json();
            expenses = data.record || [];
            render();
            statusEl.innerText = "Cloud Synced ✅";
        } catch (e) {
            statusEl.innerText = "Sync Error ❌";
        }
    }

    async function saveToCloud() {
        const statusEl = document.getElementById('status');
        statusEl.innerText = "Saving...";
        try {
            await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
                body: JSON.stringify(expenses)
            });
            statusEl.innerText = "Saved to Cloud ✅";
        } catch (e) {
            statusEl.innerText = "Cloud Error ❌";
        }
    }

    function addExpense() {
        const date = document.getElementById('date').value;
        const desc = document.getElementById('desc').value;
        const amountValue = document.getElementById('amount').value;
        const amount = parseFloat(amountValue);
        const payer = document.getElementById('payer').value;

        if (!date || !desc || isNaN(amount)) return alert("Please enter all details!");

        expenses.push({ id: Date.now(), date, desc, amount, payer });
        render();
        saveToCloud();
        
        document.getElementById('desc').value = '';
        document.getElementById('amount').value = '';
    }

    function deleteLine(id) {
        if(confirm("Remove this expense?")) {
            expenses = expenses.filter(e => e.id !== id);
            render();
            saveToCloud();
        }
    }

    function render() {
        const list = document.getElementById('list');
        list.innerHTML = '';
        let eT = 0, nT = 0;
        
        // Sort newest entries to the top
        expenses.sort((a,b) => b.id - a.id);
        
        expenses.forEach(e => {
            if (e.payer === 'Erik') eT += e.amount; else nT += e.amount;
            const d = e.date.split('-').reverse().slice(0,2).join('/');
            
            list.innerHTML += `<tr>
