<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NZ Trip Sync</title>
    <style>
        body { 
            font-family: sans-serif; 
            background: #1a1a1a url('https://images.unsplash.com/photo-1469521669194-bdf95559c13d?w=1000') no-repeat center center fixed; 
            background-size: cover; 
            color: white; margin: 0; padding: 20px; display: flex; justify-content: center; 
        }
        .container { width: 100%; max-width: 400px; }
        .card { background: rgba(0,0,0,0.8); padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #444; }
        .balance { background: white; color: black; padding: 20px; border-radius: 10px; text-align: center; font-size: 1.2rem; font-weight: bold; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #666; background: #222; color: white; font-size: 16px; }
        button { width: 100%; padding: 15px; background: #007aff; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        td { padding: 10px 5px; border-bottom: 1px solid #333; font-size: 0.9rem; }
        .erik { color: #4cd9ff; } .nadine { color: #ff85c1; }
        .status { text-align: center; font-size: 12px; margin-bottom: 10px; color: #aaa; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center;">🇳🇿 NZ TRIP SYNC</h2>
    <div id="status" class="status">Connecting...</div>
    
    <div class="card">
        <div id="balanceText" class="balance">Loading...</div>
    </div>

    <div class="card">
        <input type="date" id="date">
        <input type="text" id="desc" placeholder="What was it?">
        <input type="number" id="amount" placeholder="0.00" inputmode="decimal">
        <select id="payer">
            <option value="Erik">Erik</option>
            <option value="Nadine">Nadine</option>
        </select>
        <button onclick="addExpense()">Add Expense</button>
    </div>

    <div class="card">
        <table><tbody id="list"></tbody></table>
    </div>
</div>

<script>
    const BIN_ID = '69b88720aa77b81da9ee9c67'; 
    const API_KEY = '$2a$10$RfeNG6fuZHWzfHxMyVS1AuNG9Zr11QdW3/GvgTM9CtJpGXk03oyOK';
    let expenses = [];

    async function load() {
        try {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                headers: { 'X-Master-Key': API_KEY }
            });
            const data = await res.json();
            expenses = data.record || [];
            render();
            document.getElementById('status').innerText = "Cloud Synced ✅";
        } catch (e) { document.getElementById('status').innerText = "Error Loading ❌"; }
    }

    async function save() {
        document.getElementById('status').innerText = "Saving...";
        try {
            await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
                body: JSON.stringify(expenses)
            });
            document.getElementById('status').innerText = "Saved ✅";
        } catch (e) { document.getElementById('status').innerText = "Save Error ❌"; }
    }

    function addExpense() {
        const date = document.getElementById('date').value;
        const desc = document.getElementById('desc').value;
        const amount = parseFloat(document.getElementById('amount').value);
        const payer = document.getElementById('payer').value;
        if (!date || !desc || isNaN(amount)) return alert("Fill everything!");
        expenses.push({ id: Date.now(), date, desc, amount, payer });
        render();
        save();
        document.getElementById('desc').value = '';
        document.getElementById('amount').value = '';
    }

    function render() {
        const list = document.getElementById('list');
        list.innerHTML = '';
        let eT = 0, nT = 0;
        expenses.sort((a,b) => b.id - a.id).forEach(e => {
            if (e.payer === 'Erik') eT += e.amount; else nT += e.amount;
            list.innerHTML += `<tr>
                <td>${e.desc}</td>
                <td>$${e.amount.toFixed(2)}</td>
                <td class="${e.payer.toLowerCase()}">${e.payer}</td>
            </tr>`;
        });
        const total = eT + nT;
        const diff = eT - (total/2);
        const bal = document.getElementById('balanceText');
        if (expenses.length === 0) bal.innerText = "Welcome!";
        else if (diff > 0) bal.innerText = "Nadine owes Erik: $" + diff.toFixed(2);
        else if (diff < 0) bal.innerText = "Erik owes Nadine: $" + Math.abs(diff).toFixed(2);
        else bal.innerText = "All Even!";
    }

    document.getElementById('date').valueAsDate = new Date();
    load();
</script>
</body>
</html>
