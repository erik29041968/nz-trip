<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NZ Trip Sync</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            /* MATCHES YOUR FILENAME: background.jpeg */
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.8)), 
                        url('background.jpeg');
            background-size: cover;
            background-position: top center;
            background-attachment: fixed;
            background-color: #000; 
            color: white; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            justify-content: center;
            min-height: 100vh;
        }
        .container { width: 100%; max-width: 420px; }
        .card { 
            background: rgba(0, 0, 0, 0.8); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 20px; 
            border-radius: 24px; 
            margin-bottom: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 12px 40px rgba(0,0,0,0.7);
        }
        .balance { 
            background: #ffffff; 
            color: #000000; 
            padding: 25px; 
            border-radius: 18px; 
            text-align: center; 
            font-size: 1.35rem; 
            font-weight: 900;
            text-transform: uppercase;
        }
        label { display: block; margin-top: 12px; font-size: 0.7rem; color: #aaa; text-transform: uppercase; letter-spacing: 1.5px; }
        input, select { 
            width: 100%; padding: 15px; margin: 6px 0 12px 0; border-radius: 12px; 
            border: 1px solid rgba(255, 255, 255, 0.2); background: rgba(255, 255, 255, 0.08); 
            color: white; font-size: 16px; outline: none;
        }
        button { 
            width: 100%; padding: 18px; background: #007aff; border: none; 
            color: white; border-radius: 14px; font-weight: bold; 
            cursor: pointer; margin-top: 10px; text-transform: uppercase;
            letter-spacing: 2px;
        }
        button:active { transform: scale(0.98); opacity: 0.9; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        td { padding: 15px 5px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); font-size: 0.95rem; }
        .erik { color: #4cd9ff; font-weight: bold; }
        .nadine { color: #ff85c1; font-weight: bold; }
        .status { text-align: center; font-size: 11px; color: rgba(255,255,255,0.6); margin-bottom: 15px; font-weight: 700; text-transform: uppercase; }
        h2 { text-align: center; margin-top: 0; letter-spacing: 6px; font-weight: 900; color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        .del-btn { color: #ff3b30; background: none; border: 1px solid rgba(255,59,48,0.4); cursor: pointer; border-radius: 50%; width: 28px; height: 28px; font-size: 11px; display: flex; align-items: center; justify-content: center; }
        #totalCost { text-align: center; margin-top: 20px; font-weight: bold; color: #888; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2>AIR NZ TRIP</h2>
    <div id="status" class="status">Connecting...</div>
    
    <div class="card">
        <div id="balanceText" class="balance">Ready</div>
    </div>

    <div class="card">
        <label>Date</label>
        <input type="date" id="date">
        <label>Description</label>
        <input type="text" id="desc" placeholder="Expense description">
        <label>Amount ($)</label>
        <input type="number" id="amount" placeholder="0.00" inputmode="decimal">
        <label>Who Paid?</label>
        <select id="payer">
            <option value="Erik">Erik</option>
            <option value="Nadine">Nadine</option>
        </select>
        <button onclick="addExpense()">Add Expense</button>
