<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NZ Trip Sync</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.6)), 
                        url('./background.jpeg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #000; 
            margin: 0; padding: 20px; 
            display: flex; justify-content: center;
            min-height: 100vh;
        }
        .container { width: 100%; max-width: 420px; }
        .header { text-align: center; padding: 20px 0; color: white; }
        .header h2 { margin: 0; letter-spacing: 4px; font-weight: 900; text-transform: uppercase; text-shadow: 0 2px 10px rgba(0,0,0,0.8); }
        .status { text-align: center; font-size: 11px; color: #fff; margin-bottom: 10px; font-weight: 700; text-transform: uppercase; }
        
        /* Solid White Cards */
        .card { 
            background: #ffffff; 
            padding: 20px; 
            border-radius: 18px; 
            margin-bottom: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            color: #333;
        }
        .balance-box { 
            background: #f8f9fa; 
            color: #000; 
            padding: 20px; 
            border-radius: 12px; 
            text-align: center; 
            font-size: 1.3rem; 
            font-weight: 900;
            text-transform: uppercase;
            border: 1px solid #eee;
        }
        label { display: block; margin-top: 12px; font-size: 0.7rem; color: #666; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
        input, select { 
            width: 100%; padding: 14px; margin: 6px 0 12px 0; border-radius: 10px; 
            border: 1px solid #ccc; background: #fff; color: #000; font-size: 16px; outline: none;
        }
        .btn { 
            width: 100%; padding: 18px; background: #000; border: none; 
            color: white; border-radius: 12px; font-weight: bold; 
            cursor: pointer; margin-top: 10px; text-transform: uppercase; letter-spacing: 2px;
        }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 15px 5px; border-bottom: 1px solid #eee; font-size: 0.95rem; }
        .erik { color: #007aff; font-weight: bold; }
        .nadine { color: #ff2d55; font-weight: bold; }
        .del { color: #ff3b30; background: none; border: 1px solid #ff3b30; cursor: pointer; border-radius: 50%; width: 26px; height: 26px; font-size: 10px; }
        #totalVal { text-align: center; margin-top: 20px; font-weight: bold; color: #888; border-top: 1px solid #eee; padding-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>🇳🇿 AIR NZ TRIP</h2>
    </div>

    <div id="syncStatus" class="status">Connecting...</div>
    
    <div class="card">
        <div id="balDisplay" class="balance-box">Loading...</div>
    </div>

    <div class="card">
        <label>Date</label>
        <input type="date" id="inDate">
        <label>Description</label>
        <input type="text" id="inDesc" placeholder="Flight, Dinner, Coffee...">
        <label>Amount ($)</label>
        <input type="number" id="inAmt" placeholder="0.00" inputmode="decimal">
        <label>Who Paid?</label>
        <select id="inWho">
            <option value="Erik">Erik</option>
            <option value="Nadine">Nadine</option>
        </select>
        <button class="btn" onclick="addOne()">Add Expense</button>
    </div>

    <div class="card">
        <table><tbody id="listBody"></tbody></table>
        <div id="totalVal"></div>
        <center>
            <button onclick="fetchData()" style="background:none; border:none; color:rgba(255,255,255,0.5); text-decoration:underline; font-size: 10px; cursor:pointer; margin-top:20px;">REFRESH DATA</button>
        </center>
    </div>
</div>
