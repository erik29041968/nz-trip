<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NZ Trip Final</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)), url('./background.jpeg?v=800');
            background-size: cover; background-position: center; background-attachment: fixed;
            background-color: #000; margin: 0; padding: 15px; display: flex; justify-content: center; min-height: 100vh;
        }
        .container { width: 100%; max-width: 420px; }
        .header { text-align: center; color: white; padding: 10px 0; }
        .header h2 { margin: 0; letter-spacing: 3px; font-weight: 900; text-transform: uppercase; text-shadow: 0 2px 10px rgba(0,0,0,0.8); }
        .status { text-align: center; font-size: 10px; color: #fff; margin-bottom: 10px; font-weight: 700; text-transform: uppercase; opacity: 0.8; }
        
        .card { background: #ffffff; padding: 20px; border-radius: 18px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); color: #333; }
        .balance-box { background: #f8f9fa; color: #000; padding: 22px; border-radius: 12px; text-align: center; font-size: 1.3rem; font-weight: 900; text-transform: uppercase; border: 1px solid #eee; }
        
        label { display: block; margin-top: 12px; font-size: 0.7rem; color: #666; text-transform: uppercase; font-weight: bold; }
        input, select { 
            width: 100% !important; padding: 14px; margin: 6px 0 12px 0; border-radius: 10px; 
            border: 1px solid #ccc; font-size: 16px; background: #fff; color: #000; display: block; -webkit-appearance: none;
        }
        
        .btn { width: 100%; padding: 18px; background: #000; border: none; color: white; border-radius: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }
        .btn-edit-mode { background: #007aff !important; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; table-layout: fixed; }
        td { padding: 12px 0px; border-bottom: 1px solid #eee; font-size: 0.82rem; color: #333; vertical-align: middle; }
        
        /* Column Tuning */
        .col-date { width: 42px; color: #999; font-size: 0.62rem; }
        .col-desc { width: auto; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-right: 5px; }
        .col-amt { width: 68px; text-align: right; font-weight: 600; padding-right: 4px; }
        .col-who { width: 28px; font-weight: 800; text-align: center; }
        .col-actions { width: 84px; text-align: right; white-space: nowrap; } /* Forces buttons to stay in a line */

        .erik { color: #007aff; }
        .nadine { color: #ff2d55; }
        
        .act-btn { 
            border-radius: 8px; width: 34px; height: 34px; cursor: pointer; font-size: 15px; 
            display: inline-flex; align-items: center; justify-content: center;
            margin-left: 2px; border: 1px solid #eee; background: #fff;
        }
        .btn-edit { color: #007aff; border-color: #007aff; }
        .btn-del { color: #ff3b30; border-color: #ff3b30; }

        #totalVal { text-align: center; padding-top: 15px; font-weight: bold; font-size: 11px; color: #999; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h2>🇳🇿 AIR NZ TRIP</h2></div>
    <div id="syncStatus" class="status">Connecting...</div>
    <div class="card"><div id="balDisplay" class="balance-box">...</div></div>

    <div class="card">
        <label>Date</label><input type="date" id="inDate">
        <label>Description</label><input type="text" id="inDesc" placeholder="Lunch, Fuel, etc.">
        <label>Amount ($)</label><input type="number" id="inAmt" placeholder="0.00" inputmode="decimal">
        <label>Who Paid?</label>
        <select id="inWho"><option value="Erik">Erik</option><option value="Nadine">Nadine</option></select>
        <button class="btn" id="mainBtn" onclick="addOne()">Add Expense</button>
    </div>

    <div class="card" style="padding: 20px 10px;"> <table><tbody id="listBody"></tbody></table>
        <div id="totalVal">Waiting for sync...</div>
        <center><button onclick="fetchData()" style="background:none; border:none; color:#ccc; text-decoration:underline; font-size:10px; margin-top:20px; cursor:pointer;">FORCE RE-SYNC</button></center>
    </div>
</div>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbzmJkvT_bpsKZrdGIn6_HinNS98xo6jvOjabWP8rzbqGmQRvOvsWQUJhe6dZ_s1NKHC/exec'; 
    let dataList = [];
    let editId = null;

    async function fetchData() {
        const s = document.getElementById('syncStatus');
        s.innerText = "Syncing...";
        try {
            const r = await fetch(API_URL + '?nocache=' + new Date().getTime());
            const json = await r.json();
            dataList = Array.isArray(json) ? json : [];
            updateUI();
            s.innerText = "Cloud Synced ✅";
        } catch (e) { 
            s.innerText = "Sync Error - Tap Re-Sync"; 
        }
    }

    async function pushData() {
        const s = document.getElementById('syncStatus');
        s.innerText = "Saving...";
        try {
            await fetch(API_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(dataList)
            });
            s.innerText = "Saved ✅";
            setTimeout(fetchData, 2000);
        } catch (e) { s.innerText = "Save Error ❌"; }
    }

    function addOne() {
        const d = document.getElementById('inDate').value, 
              s = document.getElementById('inDesc').value, 
              a = parseFloat(document.getElementById('inAmt').value), 
              w = document.getElementById('inWho').value;
        if (!d || !s || isNaN(a)) return alert("Fill all fields");
        
        if (editId) {
            const idx = dataList.findIndex(i => i.id === editId);
            if (idx !== -1) dataList[idx] = { id: editId, d, s, a, w };
            editId = null;
            document.getElementById('mainBtn').innerText = "Add Expense";
            document.getElementById('mainBtn').classList.remove('btn-edit-mode');
        } else {
            dataList.push({ id: Date.now(), d, s, a, w });
        }

        updateUI(); 
        pushData();
        document.getElementById('inDesc').value = ''; 
        document.getElementById('inAmt').value = '';
        document.getElementById('inDate').valueAsDate = new Date();
    }

    function editOne(id) {
        const item = dataList.find(i => i.id === id);
        if (!item) return;
        editId = id;
        document.getElementById('inDate').value = item.d;
        document.getElementById('inDesc').value = item.s;
