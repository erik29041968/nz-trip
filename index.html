<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NZ Trip Final</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)), url('./background.jpeg?v=300');
            background-size: cover; background-position: center; background-attachment: fixed;
            background-color: #000; margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh;
        }
        .container { width: 100%; max-width: 420px; }
        .header { text-align: center; color: white; padding: 10px 0; }
        .header h2 { margin: 0; letter-spacing: 3px; font-weight: 900; text-transform: uppercase; text-shadow: 0 2px 10px rgba(0,0,0,0.8); }
        .status { text-align: center; font-size: 10px; color: #fff; margin-bottom: 10px; font-weight: 700; text-transform: uppercase; opacity: 0.8; }
        
        .card { background: #ffffff; padding: 20px; border-radius: 18px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); color: #333; }
        .balance-box { background: #f8f9fa; color: #000; padding: 22px; border-radius: 12px; text-align: center; font-size: 1.3rem; font-weight: 900; text-transform: uppercase; border: 1px solid #eee; }
        
        label { display: block; margin-top: 12px; font-size: 0.7rem; color: #666; text-transform: uppercase; font-weight: bold; }
        
        input, select { 
            width: 100% !important; 
            padding: 14px; 
            margin: 6px 0 12px 0; 
            border-radius: 10px; 
            border: 1px solid #ccc; 
            font-size: 16px; 
            background: #fff; 
            color: #000; 
            display: block;
            -webkit-appearance: none;
        }
        
        .btn { width: 100%; padding: 18px; background: #000; border: none; color: white; border-radius: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }
        .btn-edit-mode { background: #007aff; } /* Blue button when editing */
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; table-layout: fixed; }
        td { padding: 12px 0px; border-bottom: 1px solid #eee; font-size: 0.82rem; color: #333; vertical-align: middle; }
        
        .col-date { width: 45px; color: #999; font-size: 0.65rem; }
        .col-desc { width: auto; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .col-amt { width: 70px; text-align: right; font-weight: 600; padding-right: 5px; }
        .col-who { width: 55px; font-weight: 800; text-align: center; }
        .col-actions { width: 80px; text-align: right; white-space: nowrap; }

        .erik { color: #007aff; }
        .nadine { color: #ff2d55; }
        
        /* Action Buttons */
        .act-btn { 
            border-radius: 6px; 
            width: 32px; 
            height: 32px; 
            cursor: pointer; 
            font-size: 14px;
            display: inline-flex; 
            align-items: center; 
            justify-content: center;
            border: 1px solid #ddd;
            background: #fff;
            margin-left: 4px;
        }
        .btn-del { color: #ff3b30; border-color: #ff3b30; }
        .btn-edit { color: #007aff; border-color: #007aff; }

        #totalVal { text-align: center; padding-top: 15px; font-weight: bold; font-size: 11px; color: #999; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h2>🇳🇿 AIR NZ TRIP</h2></div>
    <div id="syncStatus" class="status">Connecting...</div>
    <div class="card"><div id="balDisplay" class="balance-box">...</div></div>

    <div class="card">
        <label>Date</label><input type="date" id="inDate">
        <label>Description</label><input type="text" id="inDesc" placeholder="Lunch, Fuel, etc.">
        <label>Amount ($)</label><input type="number" id="inAmt" placeholder="0.00" inputmode="decimal">
        <label>Who Paid?</label>
        <select id="inWho"><option value="Erik">Erik</option><option value="Nadine">Nadine</option></select>
        <button class="btn" id="mainBtn" onclick="addOne()">Add Expense</button>
    </div>

    <div class="card">
        <table><tbody id="listBody"></tbody></table>
        <div id="totalVal">Checking for data...</div>
        <center><button onclick="fetchData()" style="background:none; border:none; color:#ccc; text-decoration:underline; font-size:10px; margin-top:20px; cursor:pointer;">RE-SYNC DATA</button></center>
    </div>
</div>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbzmJkvT_bpsKZrdGIn6_HinNS98xo6jvOjabWP8rzbqGmQRvOvsWQUJhe6dZ_s1NKHC/exec'; 
    let dataList = [];
    let editId = null; // Tracks if we are editing an existing item

    async function fetchData() {
        const s = document.getElementById('syncStatus');
        s.innerText = "Syncing...";
        try {
            const response = await fetch(API_URL + '?t=' + Date.now(), { method: 'GET', credentials: 'omit' });
            const json = await response.json();
            dataList = Array.isArray(json) ? json : [];
            updateUI();
            s.innerText = "Cloud Synced ✅";
        } catch (e) { 
            console.error(e);
            s.innerText = "Sync Error - Tap Re-Sync"; 
        }
    }

    async function pushData() {
        const s = document.getElementById('syncStatus');
        s.innerText = "Saving...";
        try {
            await fetch(API_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify(dataList)
            });
            s.innerText = "Saved ✅";
            setTimeout(fetchData, 1500);
        } catch (e) { s.innerText = "Save Error ❌"; }
    }

    function addOne() {
        const d = document.getElementById('inDate').value, 
              s = document.getElementById('inDesc').value, 
              a = parseFloat(document.getElementById('inAmt').value), 
              w = document.getElementById('inWho').value;
        if (!d || !s || isNaN(a)) return alert("Fill all fields");
        
        if (editId) {
            // Update existing
            const index = dataList.findIndex(i => i.id === editId);
            if (index !== -1) dataList[index] = { id: editId, d, s, a, w };
            editId = null;
            document.getElementById('mainBtn').innerText = "Add Expense";
            document.getElementById('mainBtn').classList.remove('btn-edit-mode');
        } else {
            // Add new
            dataList.push({ id: Date.now(), d, s, a, w });
        }

        updateUI(); 
        pushData();
        
        document.getElementById('inDesc').value = ''; 
        document.getElementById('inAmt').value = '';
        document.getElementById('inDate').valueAsDate = new Date();
    }

    function editOne(id) {
        const item = dataList.find(i => i.id === id);
        if (!item) return;

        editId = id;
        document.getElementById('inDate').value = item.d;
        document.getElementById('inDesc').value = item.s;
        document.getElementById('inAmt').value = item.a;
        document.getElementById('inWho').value = item.w;

        const btn = document.getElementById('mainBtn');
        btn.innerText = "Update Expense";
        btn.classList.add('btn-edit-mode');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function removeOne(id) {
        if(confirm("Delete this?")) {
            dataList = dataList.filter(i => i.id !== id);
            updateUI(); 
            pushData();
        }
    }

    function updateUI() {
        const b = document.getElementById('listBody'), 
              bal = document.getElementById('balDisplay'), 
              tot = document.getElementById('totalVal');
        
        b.innerHTML = ''; 
        let eT = 0, nT = 0;

        dataList.sort((x, y) => {
            const timeX = new Date(x.d).getTime();
            const timeY = new Date(y.d).getTime();
            if (timeY !== timeX) return timeY - timeX;
            return y.id - x.id;
        });

        dataList.forEach(i => {
            const amt = parseFloat(i.a) || 0;
            const whoPaid = i.w || 'Erik';
            if (whoPaid === 'Erik') eT += amt; else nT += amt;
            
            let displayDate = "--/--";
            if (i.d) {
                try {
                    const dObj = new Date(i.d);
                    displayDate = `${String(dObj.getDate()).padStart(2, '0')}/${String(dObj.getMonth() + 1).padStart(2, '0')}`;
                } catch(e) { displayDate = "??/??"; }
            }

            b.innerHTML += `<tr>
                <td class="col-date">${displayDate}</td>
                <td class="col-desc">${i.s}</td>
                <td class="col-amt">$${amt.toFixed(2)}</td>
                <td class="col-who ${whoPaid.toLowerCase()}">${whoPaid.substring(0,1)}</td>
                <td class="col-actions">
                    <button class="act-btn btn-edit" onclick="editOne(${i.id})">✎</button>
                    <button class="act-btn btn-del" onclick="removeOne(${i.id})">✕</button>
                </td>
            </tr>`;
        });
        
        const total = eT + nT;
        const diff = eT - (total/2);
        tot.innerText = dataList.length > 0 ? "Trip Total: $" + total.toFixed(2) : "No entries found";
        
        if (dataList.length === 0) {
            bal.innerText = "Ready to start";
        } else if (diff > 0) {
            bal.innerHTML = `<small style="font-size:0.8rem; font-weight:normal; color:#666;">Nadine owes Erik</small><br>$${diff.toFixed(2)}`;
        } else if (diff < 0) {
            bal.innerHTML = `<small style="font-size:0.8rem; font-weight:normal; color:#666;">Erik owes Nadine</small><br>$${Math.abs(diff).toFixed(2)}`;
        } else {
            bal.innerText = "All Even! 🇳🇿";
        }
    }

    document.getElementById('inDate').valueAsDate = new Date();
    fetchData();
</script>
</body>
</html>
