<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NZ Trip Sync</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.6)), url('./background.jpeg?v=13');
            background-size: cover; background-position: center; background-attachment: fixed;
            background-color: #000; margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh;
        }
        .container { width: 100%; max-width: 420px; }
        .header { text-align: center; padding: 10px 0; color: white; }
        .header h2 { margin: 0; letter-spacing: 3px; font-weight: 900; text-transform: uppercase; text-shadow: 0 2px 10px rgba(0,0,0,0.8); }
        .status { text-align: center; font-size: 11px; color: #fff; margin-bottom: 10px; font-weight: 700; text-transform: uppercase; }
        
        .card { background: #ffffff; padding: 20px; border-radius: 18px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); color: #333; }
        .balance-box { background: #f8f9fa; color: #000; padding: 20px; border-radius: 12px; text-align: center; font-size: 1.25rem; font-weight: 900; text-transform: uppercase; border: 1px solid #eee; }
        
        label { display: block; margin-top: 12px; font-size: 0.7rem; color: #666; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
        input, select { width: 100%; padding: 14px; margin: 6px 0 12px 0; border-radius: 10px; border: 1px solid #ccc; background: #fff; color: #000; font-size: 16px; outline: none; }
        
        .btn { width: 100%; padding: 18px; background: #000; border: none; color: white; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; text-transform: uppercase; letter-spacing: 2px; }
        
        table { width: 100%; border-collapse: collapse; }
        td { padding: 12px 4px; border-bottom: 1px solid #eee; font-size: 0.85rem; vertical-align: middle; }
        .erik { color: #007aff; font-weight: bold; }
        .nadine { color: #ff2d55; font-weight: bold; }
        
        .del-btn { color: #ff3b30; background: #fff; border: 1px solid #ff3b30; cursor: pointer; border-radius: 6px; width: 30px; height: 30px; font-weight: bold; display: flex; align-items: center; justify-content: center; }
        #totalVal { text-align: center; margin-top: 20px; font-weight: bold; color: #888; border-top: 1px solid #eee; padding-top: 15px; text-transform: uppercase; font-size: 11px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h2>🇳🇿 AIR NZ TRIP</h2></div>
    <div id="syncStatus" class="status">Connecting...</div>
    <div class="card"><div id="balDisplay" class="balance-box">...</div></div>

    <div class="card">
        <label>Date</label><input type="date" id="inDate">
        <label>Description</label><input type="text" id="inDesc" placeholder="Lunch, Fuel, etc.">
        <label>Amount ($)</label><input type="number" id="inAmt" placeholder="0.00" inputmode="decimal">
        <label>Who Paid?</label>
        <select id="inWho"><option value="Erik">Erik</option><option value="Nadine">Nadine</option></select>
        <button class="btn" onclick="addOne()">Add Expense</button>
    </div>

    <div class="card">
        <table><tbody id="listBody"></tbody></table>
        <div id="totalVal"></div>
        <center><button onclick="fetchData()" style="background:none; border:none; color:#999; text-decoration:underline; font-size: 10px; cursor:pointer; margin-top:20px;">REFRESH CLOUD</button></center>
    </div>
</div>

<script>
    const B_ID = '69b88720aa77b81da9ee9c67'; 
    const A_KEY = '$2a$10$RfeNG6fuZHWzfHxMyVS1AuNG9Zr11QdW3/GvgTM9CtJpGXk03oyOK';
    let dataList = [];

    async function fetchData() {
        const s = document.getElementById('syncStatus');
        s.innerText = "Syncing...";
        try {
            // Updated to the most basic fetch possible to avoid CORS/Security blocks
            const r = await fetch(`https://api.jsonbin.io/v3/b/${B_ID}/latest`, {
                headers: { 'X-Master-Key': A_KEY }
            });
            
            if (!r.ok) throw new Error("Cloud Rejected Request");
            
            const res = await r.json();
            
            // Extract data from 'record' property which JSONBin uses by default
            dataList = res.record || [];

            updateUI();
            s.innerText = "Cloud Synced ✅";
        } catch (e) { 
            console.error(e);
            s.innerText = "Connection Error ❌"; 
            document.getElementById('balDisplay').innerText = "Offline Mode";
        }
    }

    async function pushData() {
        const s = document.getElementById('syncStatus');
        s.innerText = "Saving...";
        try {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${B_ID}`, {
                method: 'PUT',
                headers: { 
                    'Content-Type': 'application/json', 
                    'X-Master-Key': A_KEY 
                },
                body: JSON.stringify(dataList)
            });
            if (res.ok) s.innerText = "Saved ✅";
            else s.innerText = "Save Failed ❌";
        } catch (e) { s.innerText = "Save Error ❌"; }
    }

    function addOne() {
        const d = document.getElementById('inDate').value, 
              s = document.getElementById('inDesc').value, 
              a = parseFloat(document.getElementById('inAmt').value), 
              w = document.getElementById('inWho').value;
        if (!d || !s || isNaN(a)) return alert("Fill all fields");
        dataList.push({ id: Date.now(), d, s, a, w });
        updateUI(); 
        pushData();
        document.getElementById('inDesc').value = ''; 
        document.getElementById('inAmt').value = '';
    }

    function removeOne(id) {
        if(confirm("Delete this?")) {
            dataList = dataList.filter(i => i.id !== id);
            updateUI(); 
            pushData();
        }
    }

    function updateUI() {
        const b = document.getElementById('listBody'), 
              bal = document.getElementById('balDisplay'), 
              tot = document.getElementById('totalVal');
        b.innerHTML = ''; 
        let eT = 0, nT = 0;
        
        if (!Array.isArray(dataList)) dataList = [];

        dataList.sort((x,y) => y.id - x.id).forEach(i => {
            if (i.w === 'Erik') eT += i.a; else nT += i.a;
            const dt = i.d ? i.d.split('-').reverse().slice(0,2).join('/') : '--/--';
            b.innerHTML += `<tr><td style="color:#999;font-size:0.7rem;">${dt}</td><td><b>${i.s}</b></td><td>$${i.a.toFixed(2)}</td><td class="${String(i.w).toLowerCase()}">${i.w}</td><td style="text-align:right;"><button class="del-btn" onclick="removeOne(${i.id})">✕</button></td></tr>`;
        });
        
        const total = eT + nT;
        const diff = eT - (total/2);
        tot.innerText = "TRIP TOTAL: $" + total.toFixed(2);
        
        if (dataList.length === 0) {
            bal.innerText = "Ready for Takeoff";
        } else if (diff > 0) {
            bal.innerHTML = `<span style="font-size:0.75rem;color:#666;font-weight:normal;">Nadine owes Erik</span><br>$${diff.toFixed(2)}`;
        } else if (diff < 0) {
            bal.innerHTML = `<span style="font-size:0.75rem;color:#666;font-weight:normal;">Erik owes Nadine</span><br>$${Math.abs(diff).toFixed(2)}`;
        } else {
            bal.innerText = "All Even! 🇳🇿";
        }
    }

    document.getElementById('inDate').valueAsDate = new Date();
    fetchData();
</script>
</body>
</html>
