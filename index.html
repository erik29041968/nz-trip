    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.6)),

            min-height: 100vh;
        }
        .container { width: 100%; max-width: 420px; }
        .header { text-align: center; padding: 10px 0 20px 0; color: white; }

        .status { text-align: center; font-size: 11px; color: #fff; margin-bottom: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        
        .card { 
            background: #ffffff; 
            padding: 20px; 
            border-radius: 18px; 
            margin-bottom: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            color: #333;
        }
        .balance-box { 
            background: #f8f9fa; 
            color: #000; 
            padding: 22px; 
            border-radius: 12px; 
            text-align: center; 
            font-size: 1.25rem; 
            font-weight: 900;
            text-transform: uppercase;
            border: 1px solid #eee;
            line-height: 1.4;
        }
        label { display: block; margin-top: 12px; font-size: 0.7rem; color: #666; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
        input, select { 
            width: 100%; padding: 14px; margin: 6px 0 12px 0; border-radius: 10px; 
            border: 1px solid #ccc; background: #fff; color: #000; font-size: 16px; outline: none;
        }
        .btn { 
            width: 100%; padding: 18px; background: #000; border: none; 
            color: white; border-radius: 12px; font-weight: bold; 
            cursor: pointer; margin-top: 10px; text-transform: uppercase; letter-spacing: 2px;
        }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 15px 5px; border-bottom: 1px solid #eee; font-size: 0.95rem; }
        .erik { color: #007aff; font-weight: bold; }
        .nadine { color: #ff2d55; font-weight: bold; }
        .del { color: #ff3b30; background: none; border: 1px solid #ff3b30; cursor: pointer; border-radius: 50%; width: 26px; height: 26px; font-size: 10px; display: flex; align-items: center; justify-content: center; }
        #totalVal { text-align: center; margin-top: 20px; font-weight: bold; color: #888; border-top: 1px solid #eee; padding-top: 15px; text-transform: uppercase; font-size: 12px; }
    </style>
</head>
