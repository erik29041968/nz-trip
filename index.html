<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NZ Trip Sync</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.5)), 
                        url('./background.jpeg?v=3');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #000; 
            margin: 0; padding: 20px; 
            display: flex; justify-content: center;
            min-height: 100vh;
        }
        .container { width: 100%; max-width: 420px; position: relative; }
        
        /* The Kiwi Icon Background */
        .header-box {
            position: relative;
            text-align: center;
            padding: 20px 0;
            margin-bottom: 5px;
        }
        .kiwi-icon {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80px; opacity: 0.2;
            z-index: 0;
        }

        h2 { 
            position: relative; 
            z-index: 1; 
            margin: 0; 
            letter-spacing: 4px; 
            font-weight: 900; 
            color: #fff; 
            text-shadow: 0 2px 10px rgba(0,0,0,0.5); 
        }

        .card { 
            background: #ffffff; 
            padding: 20px; 
            border-radius: 18px; 
            margin-bottom: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            color: #333;
        }
        .balance { 
            background: #f4f4f4; 
            color: #000; 
            padding: 20px; 
            border-radius: 12px; 
            text-align: center; 
            font-size: 1.3rem; 
            font-weight: 900;
            text-transform: uppercase;
        }
        label { display: block; margin-top: 12px; font-size: 0.7rem; color: #666; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
        input, select { 
            width: 100%; padding: 14px; margin: 6px 0 12px 0; border-radius: 10px; 
            border: 1px solid #ddd; background: #fff; color: #000; font-size: 16px; outline: none;
        }
        .add-btn { 
            width: 100%; padding: 18px; background: #000; border: none; 
            color: white; border-radius: 12px; font-weight: bold; 
            cursor: pointer; margin-top: 10px; text-transform: uppercase; letter-spacing: 2px;
        }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 15px 5px; border-bottom: 1px solid #eee; font-size: 0.95rem; color: #333; }
