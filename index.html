<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NZ Trip Sync</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.5)), 
                        url('./background.jpeg?v=2');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #000; 
            color: #333; /* Darker text for white cards */
            margin: 0; 
            padding: 20px; 
            display: flex; 
            justify-content: center;
            min-height: 100vh;
        }
        .container { width: 100%; max-width: 420px; }
        .card { 
            background: #ffffff; /* Solid White Frame */
            padding: 20px; 
            border-radius: 18px; 
            margin-bottom: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .balance { 
            background: #f0f0f0; 
            color: #000000; 
            padding: 20px; 
            border-radius: 12px; 
            text-align: center; 
            font-size: 1.3rem; 
            font-weight: 900;
            text-transform: uppercase;
        }
        label { display: block; margin-top: 12px; font-size: 0.7rem; color: #666; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
        input, select { 
            width: 100%; padding: 14px; margin: 6px 0 12px 0; border-radius: 10px; 
            border: 1px solid #ddd; background: #fff; 
            color: #000; font-size: 16px; outline: none;
        }
        button { 
            width: 100%; padding: 18px; background: #000000; border: none; 
            color: white; border-radius: 12px; font-weight: bold; 
            cursor: pointer; margin-top: 10px; text-transform: uppercase;
            letter-spacing: 2px;
        }
        button:active { background: #333; transform: scale(0.98); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        td { padding: 15px 5px; border-bottom: 1px solid #eee; font-size: 0.95rem; color: #333; }
        .erik { color: #007aff; font-weight: bold; }
        .nadine { color: #ff2d55; font-weight: bold; }
        .status { text-align: center; font-size: 11px; color: #fff; margin-bottom: 15px; font-weight: 700; text-transform: uppercase; text-shadow: 0 1px 4px rgba(0,0,0,0.8); }
        h2 { text-align: center; margin-top: 0; letter-spacing: 4px; font-weight: 900; color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        .del-btn { color: #ff3b30; background: none; border: 1px solid #ff3b30; cursor: pointer; border-radius: 50%; width: 26px; height: 26px; font-size: 10px; display: flex; align-items: center; justify-content: center; }
        #totalCost { text-align: center; margin-top: 20px; font-weight: bold; color: #999; border-top: 1px solid #eee; padding-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2>NZ TRIP SYNC</h2>
    <div id="status" class="status">Connecting...</div>
    
    <div class="card">
        <div id="balanceText" class="balance">...</div>
    </div>

    <div class="card">
        <label>Date</label>
        <input type="date" id="date">
        <label>Description</label>
        <input type="text" id="desc" placeholder="What did we buy?">
        <label>Amount ($)</label>
        <input type="number" id="amount" placeholder="0.00" inputmode="decimal">
        <label>Who Paid?</label>
        <select id="payer">
            <option value="Erik">Erik</option>
            <option value="Nadine">Nadine</option>
        </select>
        <button onclick="addExpense()">Add Expense</button>
    </div>

    <div class="card">
        <table><tbody id="list"></tbody></table>
        <div id="totalCost"></div>
        <center>
            <button onclick="load()" style="background:none; border:none; color:#999; text-decoration:underline; font-size: 10px; cursor:pointer; margin-top:15px; letter-spacing: 1px;">FORCE CLOUD SYNC</button>
        </center>
    </div>
</div>

<script>
    const BIN_ID = '69b88720aa77b81da9ee9c67'; 
    const API_KEY = '$2a$10$RfeNG6fuZHWzfHxMyVS1AuNG9Zr11QdW3/GvgTM9CtJpGXk03oyOK';
    let expenses = [];

    async function load() {
        const s = document.getElementById('status');
        s.innerText = "Syncing with cloud...";
        try {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                headers: { 'X-Master-Key': API_KEY }
            });
            const data = await res.json();
            expenses = data.record || [];
            render();
            s.innerText = "Cloud Synced ✅";
        } catch (e) { s.innerText = "Offline Mode ⚠️"; }
    }

    async function save() {
        const s = document.getElementById('status');
        s.innerText = "Saving to cloud...";
        try {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                method: 'PUT',
                headers: { 
                    'Content-Type': 'application/json', 
                    'X-Master-Key': API_KEY 
                },
                body: JSON.stringify(expenses)
            });
            if (res.ok) {
                s.innerText = "All Changes Saved ✅";
            } else {
                s.innerText = "Cloud Error ❌";
            }
        } catch (e) { 
            s.innerText = "Save Failed ❌"; 
        }
    }

    function addExpense() {
        const date = document.getElementById('date').value;
        const desc = document.getElementById('desc').value;
        const amount = parseFloat(document.getElementById('amount').value);
        const payer = document.getElementById('payer').value;
        if (!date || !desc || isNaN(amount)) return alert("Please fill all fields");
        expenses.push({ id: Date.now(), date, desc, amount, payer });
        render();
        save();
        document.getElementById('desc').value = '';
        document.getElementById('amount').value = '';
    }
