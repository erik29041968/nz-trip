<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NZ Trip Sync</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            /* New Zealand Mountain Landscape - High Reliability Link */
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1469521669194-bdf95559c13d?auto=format&fit=crop&q=80&w=1000');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #1a1a1a;
            color: white; 
            margin: 0; padding: 20px; 
            display: flex; justify-content: center;
            min-height: 100vh;
        }
        .container { width: 100%; max-width: 450px; }
        .card { 
            background: rgba(0, 0, 0, 0.7); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 20px; 
            border-radius: 20px; 
            margin-bottom: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .balance-box { 
            background: #ffffff; 
            color: #000000; 
            padding: 20px; 
            border-radius: 15px; 
            text-align: center; 
            font-size: 1.4rem; 
            font-weight: 900;
        }
        label { display: block; margin-top: 10px; font-size: 0.7rem; color: #bbb; text-transform: uppercase; letter-spacing: 1px; }
        input, select { 
            width: 100%; padding: 14px; margin: 5px 0 10px 0; border-radius: 10px; 
            border: 1px solid rgba(255, 255, 255, 0.2); background: rgba(255, 255, 255, 0.1); 
            color: white; font-size: 16px; outline: none;
        }
        .add-btn { 
            width: 100%; padding: 16px; background: #007aff; border: none; 
            color: white; border-radius: 12px; font-weight: bold; 
            cursor: pointer; margin-top: 10px; text-transform: uppercase;
        }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 15px 5px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); font-size: 0.9rem; }
        .name-erik { color: #00d4ff; font-weight: bold; }
        .name-nadine { color: #ff6ec7; font-weight: bold; }
        .del-btn { color: #ff3b30; background: none; border: 1px solid #ff3b30; cursor: pointer; border-radius: 50%; width: 26px; height: 26px; font-size: 10px; }
        .sync-status { text-align: center; font-size: 11px; color: rgba(255,255,255,0.8); margin-bottom: 15px; font-weight: 600; text-transform: uppercase; }
        h2 { text-align: center; margin-top: 0; letter-spacing: 5px; font-weight: 900; }
    </style>
</head>
<body>

<div class="container">
    <h2>🇳🇿 NZ TRIP</h2>
    <div class="sync-status" id="status">Syncing...</div>
    
    <div class="card">
        <div class="balance-box" id="balanceText">Loading...</div>
    </div>

    <div class="card">
        <label>Date</label>
        <input type="date" id="date">
        <label>Description</label>
        <input type="text" id="desc" placeholder="Coffee, Fuel, etc.">
        <label>Amount ($)</label>
        <input type="number" id="amount" step="0.01" placeholder="0.00" inputmode="decimal">
        <label>Who paid?</label>
        <select id="payer">
            <option value="Erik">Erik</option>
            <option value="Nadine">Nadine</option>
        </select>
        <button class="add-btn" onclick="addExpense()">Add Expense</button>
    </div>

    <div class="card">
        <table><tbody id="list"></tbody></table>
        <p id="totalCost" style="text-align:center; font-weight:bold; margin-top:20px; font-size: 1.1rem; color: #aaa;"></p>
        <center>
            <button onclick="loadFromCloud()" style="background:none; border:none; color:rgba(255,255,255,0.4); text-decoration:underline; font-size: 11px; cursor:pointer;">
                MANUAL REFRESH
            </button>
        </center>
    </div>
</div>

<script>
    const BIN_ID = '69b88720aa77b81da9ee9c67'; 
    const API_KEY = '$2a$10$RfeNG6fuZHWzfHxMyVS1AuNG9Zr11QdW3/GvgTM9CtJpGXk03oyOK';

    let expenses = [];

    async function loadFromCloud() {
        const statusEl = document.getElementById('status');
        statusEl.innerText = "Syncing with Cloud...";
        try {
            const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                headers: { 'X-Master-Key': API_KEY }
            });
            const data = await res.json();
            expenses = data.record || [];
            render();
            statusEl.innerText = "Cloud Synced ✅";
        } catch (e) {
            statusEl.innerText = "Offline Mode ⚠️";
        }
    }

    async function saveToCloud() {
        const statusEl = document.getElementById('status');
        statusEl.innerText = "Saving to Cloud...";
        try {
            await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
                body: JSON.stringify(expenses)
            });
            statusEl.innerText = "All Changes Saved ✅";
        } catch (e) {
            statusEl.innerText = "Save Failed ❌";
        }
    }

    function addExpense() {
        const date = document.getElementById('date').value;
        const desc = document.getElementById('desc').value;
        const amount = parseFloat(document.getElementById('amount').value);
        const payer = document.getElementById('payer').value;
        if (!date || !desc || isNaN(amount)) return alert("Please fill in all fields");
        expenses.push({ id: Date.now(), date, desc, amount, payer });
        render();
        saveToCloud();
        document.getElementById('desc').value = '';
        document.getElementById('amount').value = '';
    }

    function deleteLine(id) {
        if(confirm("Delete this entry?")) {
            expenses = expenses.filter(e => e.id !== id);
            render();
            saveToCloud();
        }
    }
